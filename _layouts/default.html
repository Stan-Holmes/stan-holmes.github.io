<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "{{ site.name | escape }}",
        "url": "{{ site.url }}{{ site.baseurl }}",
        "sameAs": [
          "{{ site.facebook_url }}",
          "{{ site.x_url }}",
          "https://github.com/{{ site.github_username }}"
        ]
      }
    </script>

    <style>
      /* ===== CORE FIXES ===== */
      html, body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      /* Center content and limit width */
      .inner {
        max-width: 1000px;
        margin: 0 auto;
        padding-left: 20px;
        padding-right: 20px;
      }
      /* ===== END CORE FIXES ===== */

      body {
        background: #f7f8fa;
      }

      header {
        box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.2);
      }

      header .inner {
        padding-bottom: 28px;
      }

      .site-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      .site-nav a {
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 6px;
        color: #fff;
        font-weight: 700;
        padding: 7px 12px;
        text-decoration: none;
      }

      .site-nav a:hover {
        background: rgba(255, 255, 255, 0.24);
      }

      #content-wrapper {
        background: transparent;
        border-top: 0;
      }

      #main-content {
        background: #fff;
        border: 1px solid #e6e8ec;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(33, 45, 66, 0.05);
        padding: 30px;
        max-width: 100%;
        overflow-wrap: break-word;
      }

      .updates-intro {
        color: #4f5d6b;
        font-size: 18px;
        margin-top: 0;
      }

      .post-list {
        display: grid;
        gap: 18px;
        margin-top: 24px;
      }

      .post-card {
        border: 1px solid #e5e8ee;
        border-radius: 8px;
        padding: 22px;
      }

      .post-card h2 {
        margin-top: 0;
      }

      .post-card h2 a {
        text-decoration: none;
      }

      .post-date {
        color: #66717f;
        font-size: 14px;
        font-weight: 700;
        margin: 4px 0 12px;
      }

      .read-more {
        font-weight: 700;
        margin-bottom: 0;
      }

      /* ===== FOOTER FIX ===== */
      .site-footer {
        background: #202a36;
        border-top: 1px solid #141a22;
        color: #555;
        font-size: 14px; /* lock base size */
        line-height: 1.6;
        margin-top: 36px;
        padding: 30px 0;
      }

      .site-footer h2 {
        color: #fff;
        font-size: 18px;
        margin-top: 0;
      }

      .site-footer nav {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 18px;
        margin: 12px 0;
      }

      .site-footer a {
        color: #b9d7ff;
      }

      .site-footer p {
        font-size: inherit; /* prevents post styles from leaking */
        color: #d6dbe3;
        margin: 8px 0 0;
      }
      /* ===== END FOOTER FIX ===== */

      #main-content h1:before,
      #main-content h2:before,
      #main-content h3:before,
      #main-content h4:before,
      #main-content h5:before,
      #main-content h6:before {
        content: none;
        padding-right: 0;
        margin-left: 0;
      }

      /* ===== MOBILE POLISH ===== */
      @media (max-width: 600px) {
        .inner {
          padding-left: 15px;
          padding-right: 15px;
        }

        #main-content {
          padding: 20px;
        }

        .site-nav {
          gap: 8px;
        }

        .site-nav a {
          padding: 6px 10px;
          font-size: 14px;
        }
      }
      /* ===== END MOBILE POLISH ===== */
    </style>
  </head>

  <body>
    <header>
      <div class="inner">
        <a href="{{ '/' | relative_url }}">
          <h1>{{ site.title }}</h1>
        </a>
        <h2>{{ site.description }}</h2>
        <nav class="site-nav" aria-label="Main">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/updates/' | relative_url }}">Updates</a>
          <a href="{{ '/about/' | relative_url }}">About</a>
        </nav>
      </div>
    </header>

    <div id="content-wrapper">
      <div class="inner clearfix">
        <section id="main-content">
          {{ content }}
        </section>
      </div>
    </div>

    <footer class="site-footer">
      <div class="inner">
        <h2>{{ site.name }}</h2>
        <nav aria-label="Footer">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/updates/' | relative_url }}">Updates</a>
          <a href="{{ '/about/' | relative_url }}">About</a>
          <a href="{{ '/my-domains/' | relative_url }}">My Domains</a>
          <a href="{{ site.facebook_url }}" rel="me noopener" target="_blank">Facebook</a>
          <a href="{{ site.x_url }}" rel="me noopener" target="_blank">X</a>
        </nav>
        <p>{{ site.title }} - thoughts, updates, links, and projects from {{ site.name }}.</p>
        <p>&copy; {{ 'now' | date: '%Y' }} {{ site.name }}.</p>
      </div>
    </footer>
  </body>
</html>
